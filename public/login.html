<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadGen AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f0f4ff;
  overflow: hidden;
}
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(145deg, #f0f4ff 0%, #e8ecf8 40%, #f5f0ff 70%, #f0f4ff 100%);
}
.orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.45; }
.orb-1 {
  width: 550px; height: 550px;
  background: radial-gradient(circle, rgba(147,197,253,0.5), rgba(196,181,253,0.15) 60%, transparent 70%);
  top: -12%; left: -8%; animation: orbMove1 22s ease-in-out infinite;
}
.orb-2 {
  width: 450px; height: 450px;
  background: radial-gradient(circle, rgba(167,139,250,0.4), rgba(192,132,252,0.1) 60%, transparent 70%);
  bottom: -12%; right: -8%; animation: orbMove2 26s ease-in-out infinite;
}
.orb-3 {
  width: 320px; height: 320px;
  background: radial-gradient(circle, rgba(125,211,252,0.35), rgba(96,165,250,0.08) 60%, transparent 70%);
  top: 45%; left: 55%; transform: translate(-50%, -50%); animation: orbMove3 19s ease-in-out infinite;
}
@keyframes orbMove1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(90px,70px)} }
@keyframes orbMove2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-70px,-50px)} }
@keyframes orbMove3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.25)} }
.dot-overlay {
  position: fixed; inset: 0; z-index: 1;
  background-image: radial-gradient(circle, rgba(148,163,184,0.12) 1px, transparent 1px);
  background-size: 24px 24px;
}
.login-card {
  position: relative; z-index: 2; width: 100%; max-width: 400px;
  padding: 48px 40px;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.8);
  border-radius: 24px;
  box-shadow: 0 20px 50px rgba(99,102,241,0.08), 0 8px 20px rgba(0,0,0,0.04), inset 0 1px 0 rgba(255,255,255,0.9);
  animation: cardAppear 0.8s ease-out;
}
@keyframes cardAppear { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.logo { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
.logo-icon {
  width: 48px; height: 48px; border-radius: 14px;
  background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(59,130,246,0.12));
  border: 1px solid rgba(99,102,241,0.15); display: grid; place-items: center;
}
.logo-icon svg { width: 24px; height: 24px; fill: #6366f1; }
.logo h1 { font-size: 20px; font-weight: 700; color: #1e1b4b; }
.logo p { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
.login-card h2 { font-size: 24px; font-weight: 700; color: #1e1b4b; margin-bottom: 4px; }
.login-card .subtitle { font-size: 13px; color: #64748b; margin-bottom: 28px; }
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 8px; }
.form-input {
  width: 100%; padding: 12px 16px; border: 1px solid rgba(203,213,225,0.6);
  border-radius: 12px; font-size: 14px; font-family: inherit; color: #1e293b;
  background: rgba(255,255,255,0.7); transition: all 200ms ease; outline: none;
}
.form-input:focus { border-color: #818cf8; box-shadow: 0 0 0 4px rgba(129,140,248,0.12); background: #fff; }
.form-input::placeholder { color: #94a3b8; }
.input-wrap { position: relative; }
.toggle-pw {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #94a3b8; cursor: pointer; padding: 4px; display: flex; transition: color 150ms;
}
.toggle-pw:hover { color: #64748b; }
.toggle-pw svg { width: 18px; height: 18px; fill: currentColor; }
.btn {
  width: 100%; padding: 13px 20px; border-radius: 12px; font-weight: 600; font-size: 14px;
  border: none; cursor: pointer; transition: all 200ms ease; font-family: inherit;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; position: relative; overflow: hidden;
}
.btn-primary {
  background: linear-gradient(135deg, #6366f1, #818cf8); color: white; box-shadow: 0 4px 16px rgba(99,102,241,0.25);
}
.btn-primary::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, #818cf8, #a78bfa); opacity: 0; transition: opacity 200ms;
}
.btn-primary:hover::before { opacity: 1; }
.btn-primary:hover { box-shadow: 0 6px 24px rgba(99,102,241,0.35); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-primary svg { width: 16px; height: 16px; fill: white; position: relative; z-index: 1; }
.btn-primary span { position: relative; z-index: 1; }
.login-error {
  background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.12);
  color: #dc2626; font-size: 12px; font-weight: 500; padding: 10px 14px; border-radius: 10px;
  margin-bottom: 18px; display: none; align-items: center; gap: 8px;
}
.login-error svg { width: 16px; height: 16px; fill: #ef4444; flex-shrink: 0; }
.login-error.show { display: flex; }
.loading-spinner {
  width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.25);
  border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite;
  position: relative; z-index: 1;
}
@keyframes spin { to { transform: rotate(360deg); } }
[hidden] { display: none !important; }
</style>
</head>
<body>
<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="dot-overlay"></div>

<div class="login-card" id="login-card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
    <div><h1>LeadGen AI</h1><p>Lead Management Platform</p></div>
  </div>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to access your dashboard.</p>
  <div class="login-error" id="login-error">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    <span id="error-text">Invalid username or password.</span>
  </div>
  <form onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" id="username" type="text" placeholder="Enter username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input class="form-input" id="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
        <button type="button" class="toggle-pw" onclick="togglePw()"><svg id="eye" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
      </div>
    </div>
    <button class="btn btn-primary" type="submit" id="login-btn">
      <svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
      <span>Sign In</span>
    </button>
  </form>
</div>

<script>
async function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner"></div>';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      err.classList.add('show');
      document.getElementById('error-text').textContent = data.error || 'Invalid username or password.';
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> <span>Sign In</span>';
      return;
    }
    window.location.href = '/modern.html';
  } catch (e) {
    err.classList.add('show');
    document.getElementById('error-text').textContent = 'Connection error. Please try again.';
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> <span>Sign In</span>';
  }
}
function togglePw() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eye');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
  } else {
    pw.type = 'password';
    icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
  }
}
// Check if already logged in (redirect to app)
(async function checkSession() {
  try {
    const res = await fetch('/api/auth/session');
    if (res.ok) {
      window.location.href = '/modern.html';
      return;
    }
  } catch(e) {}
  // Show BigIN connection messages from URL
  const params = new URLSearchParams(window.location.search);
  if (params.get('bigin') === 'connected') {
    const errEl = document.getElementById('login-error');
    errEl.style.background = 'rgba(16,185,129,0.08)';
    errEl.style.borderColor = 'rgba(16,185,129,0.2)';
    errEl.querySelector('svg').style.fill = '#10b981';
    document.getElementById('error-text').textContent = 'Zoho Bigin connected successfully! Sign in to continue.';
    errEl.classList.add('show');
    // Clean URL
    window.history.replaceState({}, '', '/login.html');
  } else if (params.get('error')) {
    const errEl = document.getElementById('login-error');
    errEl.querySelector('svg').style.fill = '#ef4444';
    document.getElementById('error-text').textContent = params.get('message') || 'OAuth authorization failed.';
    errEl.classList.add('show');
    window.history.replaceState({}, '', '/login.html');
  }
})();
</script>
</body>
</html>
