<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Manager — Toggle Switch + Button Redesign</title>
<style>
  :root {
    --bg: #f1f5f9; --surface: #ffffff; --border: #e2e8f0; --text: #0f172a;
    --muted: #64748b; --muted-light: #94a3b8; --blue: #3b82f6; --blue-soft: #eff6ff;
    --blue-600: #2563eb; --green: #10b981; --green-soft: #ecfdf5; --amber: #f59e0b;
    --amber-soft: #fef3c7; --red: #ef4444; --red-soft: #fef2f2; --purple: #8b5cf6;
    --purple-soft: #f5f3ff; --pink: #ec4899; --pink-soft: #fdf2f8; --teal: #14b8a6;
    --teal-soft: #f0fdfa; --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Inter, "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 24px; display: grid; place-items: start center; min-height: 100vh; }
  .container { max-width: 560px; width: 100%; }

  .overlay { background: var(--surface); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; }

  .pm-header { padding: 24px 24px 20px; border-bottom: 1px solid var(--border); }
  .pm-header h2 { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; }
  .pm-header h2 .box-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #d4a574, #c4956a); display: grid; place-items: center; }
  .pm-header h2 .box-icon svg { width: 18px; height: 18px; fill: #fff; }
  .pm-header .subtitle { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
  .pm-header-top { display: flex; align-items: flex-start; justify-content: space-between; }
  .pm-close { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 16px; color: var(--muted); display: grid; place-items: center; }
  .pm-close:hover { background: var(--red-soft); color: var(--red); }

  /* Redesigned toolbar with new add button */
  .pm-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid var(--border); }
  .pm-toolbar .count { font-size: 0.82rem; color: var(--muted); font-weight: 600; }

  /* New Add Product button style */
  .add-product-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 20px; border-radius: 12px;
    border: 2px dashed var(--border);
    background: transparent;
    font-size: 0.82rem; font-weight: 700; color: var(--muted);
    cursor: pointer; transition: all 0.2s ease;
  }
  .add-product-btn:hover {
    border-color: var(--blue-600);
    color: var(--blue-600);
    background: var(--blue-soft);
  }
  .add-product-btn svg { width: 18px; height: 18px; fill: currentColor; }

  .pm-list-wrap { max-height: 400px; overflow-y: auto; padding: 8px 24px 16px; }
  .pm-list-wrap::-webkit-scrollbar { width: 6px; }
  .pm-list-wrap::-webkit-scrollbar-track { background: transparent; }
  .pm-list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .pm-card {
    display: flex; align-items: center; gap: 14px; padding: 14px 16px;
    border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px;
    transition: all 0.15s;
  }
  .pm-card:hover { box-shadow: var(--shadow); border-color: #cbd5e1; }
  .pm-card.disabled .pm-name,
  .pm-card.disabled .pm-desc { color: var(--muted-light); }

  .pm-card .pm-icon-wrap {
    width: 42px; height: 42px; border-radius: 10px; display: grid; place-items: center; flex-shrink: 0;
  }

  .pm-card .pm-info { flex: 1; min-width: 0; }
  .pm-card .pm-name { font-size: 0.88rem; font-weight: 700; margin-bottom: 2px; }
  .pm-card .pm-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.45; }

  .pm-card .pm-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  /* ===== TOGGLE SWITCH ===== */
  .toggle-switch {
    position: relative;
    width: 80px;
    height: 30px;
    border-radius: 15px;
    background: #e2e8f0;
    cursor: pointer;
    transition: background 0.25s ease;
    flex-shrink: 0;
    user-select: none;
  }
  .toggle-switch.active {
    background: var(--green);
  }
  .toggle-switch.inactive {
    background: var(--red);
  }
  .toggle-switch .toggle-thumb {
    position: absolute;
    top: 3px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    transition: left 0.25s ease, transform 0.15s ease;
    z-index: 2;
  }
  .toggle-switch.active .toggle-thumb {
    left: 53px;
  }
  .toggle-switch.inactive .toggle-thumb {
    left: 3px;
  }
  .toggle-switch:active .toggle-thumb {
    transform: scale(0.9);
  }
  .toggle-switch .toggle-label {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.6rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #fff;
    pointer-events: none;
    white-space: nowrap;
    z-index: 1;
    transition: opacity 0.2s ease;
    line-height: 1;
  }
  .toggle-switch .toggle-label.label-active {
    left: 6px;
    opacity: 0;
  }
  .toggle-switch.active .toggle-label.label-active {
    opacity: 1;
  }
  .toggle-switch .toggle-label.label-inactive {
    right: 6px;
    opacity: 0;
  }
  .toggle-switch.inactive .toggle-label.label-inactive {
    opacity: 1;
  }

  /* Edit button */
  .pm-btn.edit-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; display: grid; place-items: center;
    transition: all 0.15s;
  }
  .pm-btn.edit-btn svg { fill: var(--muted); width: 15px; height: 15px; }
  .pm-btn.edit-btn:hover { border-color: var(--blue); background: var(--blue-soft); }
  .pm-btn.edit-btn:hover svg { fill: var(--blue); }

  /* Delete button */
  .pm-btn.delete-btn {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); cursor: pointer; display: grid; place-items: center;
    transition: all 0.15s;
  }
  .pm-btn.delete-btn svg { fill: var(--muted-light); width: 15px; height: 15px; }
  .pm-btn.delete-btn:hover { border-color: var(--red); background: var(--red-soft); }
  .pm-btn.delete-btn:hover svg { fill: var(--red); }

  /* Add / Edit Form Modal */
  .pm-form-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.3); backdrop-filter: blur(3px); z-index: 200; display: grid; place-items: center; padding: 24px; }
  .pm-form-overlay[hidden] { display: none !important; }
  .pm-form-card { background: var(--surface); border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.12); width: 100%; max-width: 440px; padding: 24px; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .pm-form-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 16px; }
  .pm-form-card .form-row { margin-bottom: 12px; }
  .pm-form-card label { display: block; font-size: 0.68rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .pm-form-card input, .pm-form-card textarea, .pm-form-card select { width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); font-size: 0.85rem; font-family: inherit; background: #f8fafc; color: var(--text); }
  .pm-form-card input:focus, .pm-form-card textarea:focus, .pm-form-card select:focus { outline: none; border-color: var(--blue-600); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .pm-form-card textarea { resize: vertical; min-height: 60px; }
  .pm-form-card .color-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .pm-form-card .color-opt { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .pm-form-card .color-opt:hover { transform: scale(1.15); }
  .pm-form-card .color-opt.selected { border-color: var(--text); box-shadow: 0 0 0 2px rgba(15,23,42,0.15); }
  .pm-form-card .form-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }
  .pm-form-card .form-actions .btn { padding: 8px 18px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); font-size: 0.78rem; font-weight: 700; cursor: pointer; }
  .pm-form-card .form-actions .btn.primary { background: var(--blue-600); color: #fff; border-color: var(--blue-600); }

  .empty { text-align: center; padding: 30px; color: var(--muted-light); }
  .empty .empty-icon { font-size: 2rem; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="overlay">
    <div class="pm-header">
      <div class="pm-header-top">
        <div>
          <h2>
            <span class="box-icon"><svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM12 18l-4-4h3V8h2v6h3l-4 4z"/></svg></span>
            Product Manager
          </h2>
          <p class="subtitle">Manage products for bulk email campaigns</p>
        </div>
        <button class="pm-close" onclick="document.body.innerHTML='<div style=padding:60px;text-align:center;color:var(--muted)><p>Panel closed. <a href=javascript:location.reload()>Reopen</a></p></div>'">&times;</button>
      </div>
    </div>
    <div class="pm-toolbar">
      <span class="count" id="pmCount">5 products</span>
      <button class="add-product-btn" onclick="openAddForm()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add Product
      </button>
    </div>
    <div class="pm-list-wrap" id="pmList"></div>
  </div>
</div>

<!-- Add / Edit Form Modal -->
<div class="pm-form-overlay" id="pmFormOverlay" hidden>
  <div class="pm-form-card">
    <h3 id="pmFormTitle">Add New Product</h3>
    <input type="hidden" id="pmEditId">
    <div class="form-row"><label>Product Name</label><input id="pmName" placeholder="e.g. Insight Analytics Hub"></div>
    <div class="form-row"><label>Description</label><textarea id="pmDesc" placeholder="Short description for email campaigns..."></textarea></div>
    <div class="form-row">
      <label>Icon</label>
      <div style="font-size:0.72rem;color:var(--muted);margin-bottom:4px">Leave blank for default 📦</div>
      <select id="pmIcon" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--border);font-size:0.85rem;font-family:inherit;background:#f8fafc">
        <option value="">📦 Default (auto)</option>
        <option value="accounting">📊 Accounting</option>
        <option value="pos">🏪 POS System</option>
        <option value="stock">📱 Mobile Stock</option>
        <option value="wms">🚚 Warehouse</option>
        <option value="payroll">💰 Payroll</option>
        <option value="maxima">🚀 Campaign</option>
        <option value="analytics">📈 Analytics</option>
      </select>
    </div>
    <div class="form-row"><label>Color</label><div class="color-opts" id="pmFormColors"></div></div>
    <div class="form-actions">
      <button class="btn" onclick="closeForm()">Cancel</button>
      <button class="btn primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<script>
const PRODUCT_ICONS = {
  accounting: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>`,
  pos: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49A1.003 1.003 0 0 0 20 4H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>`,
  stock: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M17 1.01L7 1c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-1.99-2-1.99zM17 19H7V5h10v14z"/></svg>`,
  wms: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM8 20H4v-4h4v4zm0-6H4v-4h4v4zm0-6H4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4zm6 12h-4v-4h4v4zm0-6h-4v-4h4v4zm0-6h-4V4h4v4z"/></svg>`,
  payroll: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>`,
  maxima: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`,
  analytics: `<svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>`
};

const ICON_COLORS = {
  accounting: '#2563eb', pos: '#059669', stock: '#d97706',
  wms: '#7c3aed', payroll: '#db2777', maxima: '#0d9488', analytics: '#4f46e5'
};

const COLORS = [
  { key: 'blue', val: '#3b82f6', soft: '#eff6ff' },
  { key: 'green', val: '#10b981', soft: '#ecfdf5' },
  { key: 'amber', val: '#f59e0b', soft: '#fef3c7' },
  { key: 'purple', val: '#8b5cf6', soft: '#f5f3ff' },
  { key: 'red', val: '#ef4444', soft: '#fef2f2' },
  { key: 'pink', val: '#ec4899', soft: '#fdf2f8' },
  { key: 'teal', val: '#14b8a6', soft: '#f0fdfa' },
  { key: 'orange', val: '#f97316', soft: '#fff7ed' },
  { key: 'cyan', val: '#06b6d4', soft: '#ecfeff' },
  { key: 'rose', val: '#f43f5e', soft: '#fff1f2' },
  { key: 'violet', val: '#7c3aed', soft: '#f5f3ff' },
  { key: 'slate', val: '#475569', soft: '#f1f5f9' },
  { key: 'lime', val: '#84cc16', soft: '#f7fee7' },
  { key: 'sky', val: '#0ea5e9', soft: '#f0f9ff' },
];

let products = [
  { id: 1, name: 'AutoCount Accounting', desc: 'Improve accounting control, reporting speed, and day-to-day finance visibility.', icon: 'accounting', color: 'blue', active: true },
  { id: 2, name: 'AutoCount POS', desc: 'Upgrade in-store sales handling, stock sync, and branch reporting.', icon: 'pos', color: 'green', active: true },
  { id: 3, name: 'Presoft Mobile Stock', desc: 'Give sales teams live stock visibility and reduce order mistakes on the road.', icon: 'stock', color: 'amber', active: true },
  { id: 4, name: 'Cubehous WMS', desc: 'Tighten warehouse control, trace stock movement, and improve picking accuracy.', icon: 'wms', color: 'purple', active: true },
  { id: 5, name: 'AutoCount Payroll', desc: 'Simplify payroll processing, staff records, and monthly compliance work.', icon: 'payroll', color: 'pink', active: true },
];

let formColor = 'blue';
let nextId = 6;

function renderFormColors(selected, onChange) {
  document.getElementById('pmFormColors').innerHTML = COLORS.map(c =>
    `<div class="color-opt ${c.key === selected ? 'selected' : ''}" style="background:${c.val}" onclick="event.stopPropagation();document.getElementById('pmFormColors').querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));this.classList.add('selected');(${onChange.toString()})('${c.key}')"></div>`
  ).join('');
}

function openAddForm() {
  document.getElementById('pmFormTitle').textContent = 'Add New Product';
  document.getElementById('pmEditId').value = '';
  document.getElementById('pmName').value = '';
  document.getElementById('pmDesc').value = '';
  document.getElementById('pmIcon').value = '';
  formColor = 'blue';
  renderFormColors(formColor, c => { formColor = c; });
  document.getElementById('pmFormOverlay').hidden = false;
  document.getElementById('pmName').focus();
}

function openEditForm(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('pmFormTitle').textContent = 'Edit Product';
  document.getElementById('pmEditId').value = id;
  document.getElementById('pmName').value = p.name;
  document.getElementById('pmDesc').value = p.desc;
  document.getElementById('pmIcon').value = p.icon || '';
  formColor = p.color;
  renderFormColors(formColor, c => { formColor = c; });
  document.getElementById('pmFormOverlay').hidden = false;
}

function closeForm() {
  document.getElementById('pmFormOverlay').hidden = true;
}

function saveProduct() {
  const id = document.getElementById('pmEditId').value;
  const name = document.getElementById('pmName').value.trim();
  const desc = document.getElementById('pmDesc').value.trim();
  const icon = document.getElementById('pmIcon').value;
  if (!name) { alert('Product name is required'); return; }
  if (id) {
    const p = products.find(x => x.id === parseInt(id));
    if (p) { p.name = name; p.desc = desc || 'No description'; p.icon = icon || ''; p.color = formColor; }
  } else {
    products.push({ id: nextId++, name, desc: desc || 'No description', icon: icon || '', color: formColor, active: true });
  }
  closeForm();
  renderProducts();
}

function toggleProduct(id) {
  const p = products.find(x => x.id === id);
  if (p) p.active = !p.active;
  renderProducts();
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  products = products.filter(x => x.id !== id);
  renderProducts();
}

function renderProducts() {
  const list = document.getElementById('pmList');
  document.getElementById('pmCount').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;
  if (products.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📦</div><p>No products yet.</p></div>';
    return;
  }
  list.innerHTML = products.map(p => {
    const c = COLORS.find(x => x.key === p.color) || COLORS[0];
    const icon = p.icon ? PRODUCT_ICONS[p.icon] : null;
    const iconColor = p.icon ? ICON_COLORS[p.icon] || '#64748b' : '#64748b';
    const iconBg = p.icon ? c.soft : '#f1f5f9';
    const defaultClass = p.icon ? '' : 'icon-default';
    return `<div class="pm-card ${p.active ? '' : 'disabled'}">
      <div class="pm-icon-wrap" style="background:${iconBg}">
        ${icon ? icon : `<svg viewBox="0 0 24 24" width="20" height="20" fill="${iconColor}"><path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM12 18l-4-4h3V8h2v6h3l-4 4z"/></svg>`}
      </div>
      <div class="pm-info">
        <div class="pm-name">${p.name}</div>
        <div class="pm-desc">${p.desc}</div>
      </div>
      <div class="pm-actions">
        <div class="toggle-switch ${p.active ? 'active' : 'inactive'}" onclick="toggleProduct(${p.id})">
          <div class="toggle-thumb"></div>
          <span class="toggle-label label-active">Active</span>
          <span class="toggle-label label-inactive">Off</span>
        </div>
        <button class="pm-btn edit-btn" onclick="openEditForm(${p.id})" title="Edit">
          <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/></svg>
        </button>
        <button class="pm-btn delete-btn" onclick="deleteProduct(${p.id})" title="Delete">
          <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

renderFormColors(formColor, c => { formColor = c; });
renderProducts();

document.getElementById('pmFormOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeForm(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeForm(); });
</script>
</body>
</html>
