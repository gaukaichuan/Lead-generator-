<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadGen AI — Login (Style 2: Glassmorphism)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0f172a;
  overflow: hidden;
}

/* Animated background */
.bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.5;
}

.orb-1 {
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, #3b82f6, transparent 70%);
  top: -10%;
  left: -5%;
  animation: orbMove1 20s ease-in-out infinite;
}

.orb-2 {
  width: 400px;
  height: 400px;
  background: radial-gradient(circle, #8b5cf6, transparent 70%);
  bottom: -10%;
  right: -5%;
  animation: orbMove2 25s ease-in-out infinite;
}

.orb-3 {
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, #06b6d4, transparent 70%);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  animation: orbMove3 18s ease-in-out infinite;
}

@keyframes orbMove1 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(100px, 80px); }
}

@keyframes orbMove2 {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(-80px, -60px); }
}

@keyframes orbMove3 {
  0%, 100% { transform: translate(-50%, -50%) scale(1); }
  50% { transform: translate(-50%, -50%) scale(1.3); }
}

/* Grid pattern overlay */
.grid-overlay {
  position: fixed;
  inset: 0;
  z-index: 1;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* ===== GLASS CARD ===== */
.login-card {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 420px;
  padding: 48px 40px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
  animation: cardAppear 0.8s ease-out;
}

@keyframes cardAppear {
  from { opacity: 0; transform: translateY(30px) scale(0.96); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* Top glow line */
.login-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(96,165,250,0.6), transparent);
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 36px;
}

.logo-icon {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(139,92,246,0.3));
  border: 1px solid rgba(255,255,255,0.1);
  display: grid;
  place-items: center;
}

.logo-icon svg { width: 24px; height: 24px; fill: #60a5fa; }
.logo h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
.logo p { font-size: 11px; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }

.login-card h2 {
  font-size: 24px;
  font-weight: 700;
  color: #f1f5f9;
  margin-bottom: 4px;
}

.login-card .subtitle {
  font-size: 13px;
  color: #94a3b8;
  margin-bottom: 28px;
}

.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #cbd5e1;
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  padding: 12px 16px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  font-size: 14px;
  font-family: inherit;
  color: #f1f5f9;
  background: rgba(255,255,255,0.05);
  transition: all 200ms ease;
  outline: none;
}

.form-input:focus {
  border-color: rgba(96,165,250,0.5);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
  background: rgba(255,255,255,0.08);
}

.form-input::placeholder { color: #475569; }

.input-wrap { position: relative; }

.toggle-pw {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #475569;
  cursor: pointer;
  padding: 4px;
  display: flex;
  transition: color 150ms;
}

.toggle-pw:hover { color: #94a3b8; }
.toggle-pw svg { width: 18px; height: 18px; fill: currentColor; }

.btn {
  width: 100%;
  padding: 13px 20px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 14px;
  border: none;
  cursor: pointer;
  transition: all 200ms ease;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: relative;
  overflow: hidden;
}

.btn-primary {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: white;
  box-shadow: 0 4px 20px rgba(59,130,246,0.3);
}

.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, #60a5fa, #8b5cf6);
  opacity: 0;
  transition: opacity 200ms;
}

.btn-primary:hover::before { opacity: 1; }
.btn-primary:hover { box-shadow: 0 6px 30px rgba(59,130,246,0.45); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-primary svg { width: 16px; height: 16px; fill: white; position: relative; z-index: 1; }
.btn-primary span { position: relative; z-index: 1; }

.login-error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  color: #fca5a5;
  font-size: 12px;
  font-weight: 500;
  padding: 10px 14px;
  border-radius: 10px;
  margin-bottom: 18px;
  display: none;
  align-items: center;
  gap: 8px;
}

.login-error svg { width: 16px; height: 16px; fill: #fca5a5; flex-shrink: 0; }
.login-error.show { display: flex; }

.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 24px 0;
  font-size: 11px;
  color: #475569;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: rgba(255,255,255,0.08);
}

.credentials-hint {
  text-align: center;
  font-size: 11px;
  color: #475569;
}

.credentials-hint code {
  background: rgba(255,255,255,0.06);
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  color: #94a3b8;
}

.loading-spinner {
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.2);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  position: relative;
  z-index: 1;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== APP SCREEN ===== */
.app-screen {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10;
  background: #0f172a;
}

.app-screen.show { display: flex; flex-direction: column; }
.login-page.hide { display: none; }

.app-header {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.app-header-left { display: flex; align-items: center; gap: 12px; }
.app-header-left .logo-sm {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  display: grid;
  place-items: center;
}
.app-header-left .logo-sm svg { width: 18px; height: 18px; fill: white; }
.app-header h1 { font-size: 16px; font-weight: 700; color: #f1f5f9; }

.user-badge { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(59,130,246,0.15);
  display: grid;
  place-items: center;
  font-size: 13px;
  font-weight: 700;
  color: #60a5fa;
  border: 1px solid rgba(96,165,250,0.2);
}

.user-info { text-align: right; }
.user-info .name { font-size: 13px; font-weight: 600; color: #f1f5f9; }
.user-info .role {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 2px 8px;
  border-radius: 99px;
}

.role-admin { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }
.role-user { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.2); }

.welcome-box {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px;
}

.welcome-box h2 { font-size: 24px; font-weight: 700; color: #f1f5f9; margin-bottom: 8px; }
.welcome-box p { font-size: 14px; color: #94a3b8; margin-bottom: 20px; }

.preview-tag {
  display: inline-block;
  font-size: 12px;
  color: #fbbf24;
  background: rgba(245,158,11,0.1);
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid rgba(245,158,11,0.2);
}

.switch-btn {
  background: none;
  border: none;
  color: #60a5fa;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  margin-top: 20px;
  text-decoration: underline;
}
</style>
</head>
<body>

<div class="bg">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-overlay"></div>

<!-- ===== LOGIN PAGE ===== -->
<div class="login-page" id="login-page">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
      <div><h1>LeadGen AI</h1><p>Lead Management Platform</p></div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to access your dashboard.</p>

    <div class="login-error" id="login-error">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="error-text">Invalid username or password.</span>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="username" type="text" placeholder="Enter username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input class="form-input" id="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" onclick="togglePw()"><svg id="eye" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
        </div>
      </div>
      <button class="btn btn-primary" type="submit" id="login-btn">
        <svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
        <span>Sign In</span>
      </button>
    </form>

    <div class="divider">demo</div>
    <p class="credentials-hint"><code>admin / admin123</code> &nbsp;•&nbsp; <code>user / user123</code></p>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div class="app-screen" id="app-screen">
  <div class="app-header">
    <div class="app-header-left">
      <div class="logo-sm"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
      <h1>LeadGen AI</h1>
    </div>
    <div class="user-badge">
      <div class="user-info">
        <div class="name" id="app-name">Admin</div>
        <span class="role role-admin" id="app-role">Admin</span>
      </div>
      <div class="user-avatar" id="app-avatar">A</div>
    </div>
  </div>
  <div class="welcome-box">
    <h2 id="welcome-msg">Welcome, Admin!</h2>
    <p>You're logged in successfully. This is a preview — no real auth yet.</p>
    <div class="preview-tag"> Preview mode</div>
    <br>
    <button class="switch-btn" onclick="handleLogout()">Switch Account</button>
  </div>
</div>

<script>
const DEMO_USERS = {
  admin: { password: 'admin123', role: 'admin', displayName: 'Admin' },
  user:  { password: 'user123',  role: 'user',  displayName: 'Staff User' }
};

function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner"></div> Signing in...';
  setTimeout(() => {
    const user = DEMO_USERS[username];
    if (!user || user.password !== password) {
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> <span>Sign In</span>';
      return;
    }
    document.getElementById('app-avatar').textContent = user.displayName[0];
    document.getElementById('app-name').textContent = user.displayName;
    const roleEl = document.getElementById('app-role');
    roleEl.textContent = user.role === 'admin' ? 'Admin' : 'User';
    roleEl.className = 'role ' + (user.role === 'admin' ? 'role-admin' : 'role-user');
    document.getElementById('welcome-msg').textContent = 'Welcome, ' + user.displayName + '!';
    document.getElementById('login-page').classList.add('hide');
    document.getElementById('app-screen').classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> <span>Sign In</span>';
  }, 800);
}

function handleLogout() {
  document.getElementById('app-screen').classList.remove('show');
  document.getElementById('login-page').classList.remove('hide');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('login-error').classList.remove('show');
}

function togglePw() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eye');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
  } else {
    pw.type = 'password';
    icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
  }
}
</script>
</body>
</html>
