<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadGen AI — Login (Style 3: Dark Minimal)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  background: #09090b;
  color: #fafafa;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* Subtle top bar */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.top-bar .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #3b82f6;
  box-shadow: 0 0 8px rgba(59,130,246,0.6);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.top-bar span {
  font-size: 12px;
  color: #52525b;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ===== LOGIN ===== */
.login-wrap {
  width: 100%;
  max-width: 380px;
  text-align: center;
  animation: fadeUp 0.6s ease-out;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.login-wrap .logo-area {
  margin-bottom: 40px;
}

.login-wrap .logo-icon {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: #18181b;
  border: 1px solid rgba(255,255,255,0.08);
  display: grid;
  place-items: center;
  margin: 0 auto 16px;
}

.login-wrap .logo-icon svg { width: 26px; height: 26px; fill: #3b82f6; }
.login-wrap .logo-area h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-wrap .logo-area p { font-size: 13px; color: #52525b; }

.login-wrap h2 {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 4px;
}

.login-wrap .subtitle {
  font-size: 13px;
  color: #52525b;
  margin-bottom: 28px;
}

.form-group {
  margin-bottom: 16px;
  text-align: left;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #a1a1aa;
  margin-bottom: 6px;
}

.form-input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: #fafafa;
  background: #18181b;
  transition: all 150ms ease;
  outline: none;
}

.form-input:focus {
  border-color: #3b82f6;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}

.form-input::placeholder { color: #3f3f46; }

.input-wrap { position: relative; }

.toggle-pw {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: #3f3f46;
  cursor: pointer;
  padding: 4px;
  display: flex;
}

.toggle-pw:hover { color: #71717a; }
.toggle-pw svg { width: 16px; height: 16px; fill: currentColor; }

.btn {
  width: 100%;
  padding: 11px 20px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  border: none;
  cursor: pointer;
  transition: all 150ms ease;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.btn-primary {
  background: #fafafa;
  color: #09090b;
}

.btn-primary:hover {
  background: #e4e4e7;
  transform: translateY(-1px);
}

.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-primary svg { width: 16px; height: 16px; fill: #09090b; }

.login-error {
  font-size: 12px;
  color: #f87171;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 16px;
  display: none;
  align-items: center;
  gap: 8px;
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.15);
}

.login-error svg { width: 16px; height: 16px; fill: #f87171; flex-shrink: 0; }
.login-error.show { display: flex; }

.credentials-hint {
  margin-top: 24px;
  font-size: 11px;
  color: #3f3f46;
}

.credentials-hint code {
  color: #52525b;
  background: #18181b;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
}

.loading-spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(9,9,11,0.15);
  border-top-color: #09090b;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== APP SCREEN ===== */
.app-screen {
  display: none;
  width: 100%;
  max-width: 700px;
}

.app-screen.show { display: block; }
.login-page.hide { display: none; }

.app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  margin-bottom: 40px;
}

.app-header-left { display: flex; align-items: center; gap: 10px; }
.app-header-left .logo-sm {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: #18181b;
  border: 1px solid rgba(255,255,255,0.08);
  display: grid;
  place-items: center;
}
.app-header-left .logo-sm svg { width: 14px; height: 14px; fill: #3b82f6; }
.app-header h1 { font-size: 15px; font-weight: 600; }

.user-badge { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: #18181b;
  border: 1px solid rgba(255,255,255,0.08);
  display: grid;
  place-items: center;
  font-size: 12px;
  font-weight: 700;
  color: #3b82f6;
}

.user-info .name { font-size: 12px; font-weight: 600; }
.user-info .role {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #52525b;
}

.welcome-box { text-align: center; padding: 60px 0; }
.welcome-box h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
.welcome-box p { font-size: 13px; color: #52525b; margin-bottom: 16px; }

.preview-tag {
  display: inline-block;
  font-size: 11px;
  color: #fbbf24;
  background: rgba(251,191,36,0.08);
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid rgba(251,191,36,0.15);
}

.switch-btn {
  background: none;
  border: none;
  color: #3b82f6;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  margin-top: 16px;
  text-decoration: underline;
  text-decoration-color: rgba(59,130,246,0.3);
}

.switch-btn:hover { text-decoration-color: #3b82f6; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="dot"></div>
  <span>LeadGen AI</span>
</div>

<!-- ===== LOGIN PAGE ===== -->
<div class="login-page" id="login-page">
  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
      <h1>LeadGen AI</h1>
      <p>Lead Management Platform</p>
    </div>

    <h2>Sign in</h2>
    <p class="subtitle">Enter your credentials to continue.</p>

    <div class="login-error" id="login-error">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="error-text">Invalid username or password.</span>
    </div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" id="username" type="text" placeholder="Username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <input class="form-input" id="password" type="password" placeholder="Password" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" onclick="togglePw()"><svg id="eye" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg></button>
        </div>
      </div>
      <button class="btn btn-primary" type="submit" id="login-btn">
        <svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
        Sign In
      </button>
    </form>

    <p class="credentials-hint"><code>admin / admin123</code> &nbsp;•&nbsp; <code>user / user123</code></p>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div class="app-screen" id="app-screen">
  <div class="app-header">
    <div class="app-header-left">
      <div class="logo-sm"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>
      <h1>LeadGen AI</h1>
    </div>
    <div class="user-badge">
      <div class="user-avatar" id="app-avatar">A</div>
      <div class="user-info">
        <div class="name" id="app-name">Admin</div>
        <span class="role" id="app-role">Admin</span>
      </div>
    </div>
  </div>
  <div class="welcome-box">
    <h2 id="welcome-msg">Welcome, Admin!</h2>
    <p>Logged in successfully. Preview mode — no real auth yet.</p>
    <div class="preview-tag"> Preview</div>
    <br>
    <button class="switch-btn" onclick="handleLogout()">Switch Account</button>
  </div>
</div>

<script>
const DEMO_USERS = {
  admin: { password: 'admin123', role: 'admin', displayName: 'Admin' },
  user:  { password: 'user123',  role: 'user',  displayName: 'Staff User' }
};

function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<div class="loading-spinner"></div>';
  setTimeout(() => {
    const user = DEMO_USERS[username];
    if (!user || user.password !== password) {
      err.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Sign In';
      return;
    }
    document.getElementById('app-avatar').textContent = user.displayName[0];
    document.getElementById('app-name').textContent = user.displayName;
    const roleEl = document.getElementById('app-role');
    roleEl.textContent = user.role === 'admin' ? 'Admin' : 'User';
    document.getElementById('welcome-msg').textContent = 'Welcome, ' + user.displayName + '!';
    document.getElementById('login-page').classList.add('hide');
    document.getElementById('app-screen').classList.add('show');
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Sign In';
  }, 600);
}

function handleLogout() {
  document.getElementById('app-screen').classList.remove('show');
  document.getElementById('login-page').classList.remove('hide');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('login-error').classList.remove('show');
}

function togglePw() {
  const pw = document.getElementById('password');
  const icon = document.getElementById('eye');
  if (pw.type === 'password') {
    pw.type = 'text';
    icon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
  } else {
    pw.type = 'password';
    icon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
  }
}
</script>
</body>
</html>
