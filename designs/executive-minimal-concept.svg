  <g>
    <text x="116" y="470" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.6" fill="#6C7A65">WORKSPACE CHOICE</text>
    <rect x="116" y="494" width="440" height="110" rx="24" fill="#F4F6F2"/>
    <rect x="580" y="494" width="440" height="110" rx="24" fill="#FBFBF8"/>
    <rect x="1044" y="494" width="440" height="110" rx="24" fill="#FBFBF8"/>
    <text x="148" y="538" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1E2520">Lead Intake</text>
    <text x="148" y="570" font-family="Arial, sans-serif" font-size="16" fill="#6D756B">A clean form experience with sender email context and fewer distractions.</text>
    <text x="612" y="538" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1E2520">Lead Queue</text>
    <text x="612" y="570" font-family="Arial, sans-serif" font-size="16" fill="#6D756B">A more elegant operational list with quiet highlighting and measured density.</text>
    <text x="1076" y="538" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#1E2520">Email Activity</text>
    <text x="1076" y="570" font-family="Arial, sans-serif" font-size="16" fill="#6D756B">Review drafts, sender identity, exports, and timeline from one calm rail.</text>
  </g>

  <rect x="116" y="642" width="620" height="242" rx="28" fill="#FFFFFF"/>
  <text x="150" y="688" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.6" fill="#6C7A65">LEAD INTAKE PANEL</text>
  <text x="150" y="726" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1E2520">Refined data capture</text>
  <text x="150" y="766" font-family="Arial, sans-serif" font-size="17" fill="#6B7369">Two-column spacing, gentler borders, and clearer field grouping for manual lead entry.</text>
  <rect x="150" y="800" width="196" height="42" rx="16" fill="#1F2820"/>
  <text x="216" y="827" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Save Lead</text>

  <rect x="766" y="642" width="718" height="242" rx="28" fill="#FFFFFF"/>
  <text x="800" y="688" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.6" fill="#6C7A65">QUEUE + REVIEW PANEL</text>
  <text x="800" y="726" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1E2520">Executive reading flow</text>
  <text x="800" y="766" font-family="Arial, sans-serif" font-size="17" fill="#6B7369">Top metrics first, queue second, editable email drafts and exports tucked into a quiet review area.</text>
  <rect x="800" y="802" width="184" height="42" rx="16" fill="#F1F3EE" stroke="#DEE2D8"/>
  <text x="847" y="829" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#445145">Export CSV</text>
  <rect x="1000" y="802" width="184" height="42" rx="16" fill="#F1F3EE" stroke="#DEE2D8"/>
  <text x="1058" y="829" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#445145">Timeline</text>
