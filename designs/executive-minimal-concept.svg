  <text x="1424" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Login</text>

  <line x1="116" y1="240" x2="1486" y2="240" stroke="#E3E5DE" stroke-width="2"/>

  <g>
    <text x="116" y="292" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2.6" fill="#6C7A65">LIVE SNAPSHOT</text>
    <rect x="116" y="320" width="320" height="88" rx="18" fill="#F3F5F0"/>
    <rect x="460" y="320" width="320" height="88" rx="18" fill="#F8F8F5"/>
    <rect x="804" y="320" width="320" height="88" rx="18" fill="#F6F4EB"/>
    <rect x="1148" y="320" width="320" height="88" rx="18" fill="#F5F6F1"/>
    <text x="146" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#687567">Total Leads</text>
    <text x="146" y="388" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202722">184</text>
    <text x="490" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#687567">Qualified</text>
    <text x="490" y="388" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202722">62</text>
    <text x="834" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#687567">Priority Area</text>
    <text x="834" y="388" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202722">84</text>
    <text x="1178" y="350" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#687567">Emails Sent</text>
    <text x="1178" y="388" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#202722">39</text>
