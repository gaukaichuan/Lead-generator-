      <stop stop-color="#F4F5F1"/>
      <stop offset="1" stop-color="#E7EAE2"/>
    </linearGradient>
    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#868A79" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg3)"/>
  <rect x="74" y="54" width="1452" height="892" rx="30" fill="#FBFBF8" filter="url(#shadow3)"/>

  <text x="116" y="114" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#6C7A65">EXECUTIVE MINIMAL</text>
  <text x="116" y="164" font-family="Arial, sans-serif" font-size="52" font-weight="700" fill="#1D241E">Lead Generator</text>
  <text x="116" y="204" font-family="Arial, sans-serif" font-size="18" fill="#6E766D">Presentation-like clarity for a calmer lead operations experience.</text>
  <rect x="1292" y="94" width="92" height="42" rx="21" fill="#F2F3EE" stroke="#DEE1D8"/>
  <text x="1318" y="120" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#445145">Settings</text>
